<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore 30 interactive website demos across roofing, dental, HVAC, real estate and other local business industries.">
  <title>Website Demo Library — Iluminity</title><link rel="stylesheet" href="assets/css/styles.css?v=20260701-final">
</head>
<body data-base="">
  <div data-header></div><div data-drawer></div>
  <main>
    <section class="page-hero"><div class="container"><span class="eyebrow">Interactive demo library</span><h1>Thirty directions. One easier way to <span class="gradient-text">choose.</span></h1><p>Explore ten industries with three distinct, interactive website directions each. Roofing includes our deepest specialty demos; every collection can be adapted to a real business.</p><div class="hero-actions" style="justify-content:flex-start;margin-top:28px"><a class="btn btn-primary" href="roofing/">Open featured roofing demos</a><button class="btn" data-open-drawer>Search all industries</button></div></div></section>
    <section class="section" style="padding-top:30px"><div class="container"><div class="catalog-preview" data-full-catalog></div></div></section>
  </main>
  <div data-footer></div>
  <script src="assets/js/catalog.js?v=20260701-final"></script><script src="assets/js/app.js?v=20260701-final"></script>
  <script>
    document.querySelector("[data-full-catalog]").innerHTML = ILUMINITY_CATALOG.map(item => {
      const live = item.available !== false;
      const content = `<span class="tile-status">${live ? "Live · 3 demos" : "Coming soon"}</span><img src="${item.image}" alt="${item.name} website collection" loading="lazy" decoding="async"><div><h3>${item.name}</h3><p>${item.es} · ${item.pt || item.es}</p></div>`;
      return live ? `<a class="catalog-tile glass-card reveal visible is-live" href="${item.slug}/">${content}</a>` : `<div class="catalog-tile glass-card reveal visible is-upcoming">${content}</div>`;
    }).join("");
  </script>
</body>
</html>
